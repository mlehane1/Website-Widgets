<!DOCTYPE html>
<!--
  ============================================================
  F3 NATION SCHEDULE WIDGET
  ============================================================
  This file shows your region's upcoming workouts, pulled live
  from the F3 Nation API. It is self-contained — no plugins,
  no accounts, no maintenance required.

  HOW TO USE THIS ON YOUR WEBSITE
  --------------------------------
  You only need to do THREE things:

  STEP 1 — Find the CONFIG section below (search for "CONFIG")
           and fill in your region's values. There are only
           5 things to change. Instructions are next to each one.

  STEP 2 — Copy the widget HTML block (marked with
           "COPY FROM HERE" and "END COPY") and paste it
           wherever you want the widget to appear on your page.

  STEP 3 — Copy the <style> block and the <script> block into
           your page as well. Both are clearly marked.

  COMMON WEBSITE PLATFORMS
  -------------------------
  WordPress  → Use a "Custom HTML" block in the page editor
  Squarespace → Add a "Code Block" in your page
  Wix        → Add an "HTML iFrame" widget
  Weebly     → Use the "Embed Code" element
  Raw HTML   → Paste directly into your page's HTML file

  NEED HELP?
  ----------
  If you're not sure what your REGION_ORG_ID is, ask in the
  F3 tech channel and someone can look it up for you. No API
  token is needed — authentication is handled securely on the
  server. This file is safe to share publicly.

  QUESTIONS / ISSUES
  ------------------
  Post in the F3 tech Slack channel for support.
  ============================================================
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F3 Schedule Widget</title>

<!--
  ============================================================
  STYLES — copy this entire <style>...</style> block into your
  page's <head> section, or into your site's CSS file.
  You do NOT need to change anything in here unless you want
  to customize the visual appearance.
  ============================================================
-->
<style>

/* Resets box sizing so padding doesn't break layouts */
* { box-sizing: border-box; margin: 0; padding: 0; }

/* The outer widget container.
   max-width: 460px keeps it a reasonable column width.
   Change this if you need it wider or narrower. */
#f3-widget {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: #fff;
  color: #111;
  max-width: 460px;
  width: 100%;
  border: 1px solid #ddd;
}

/* ── HEADER (black bar at the top) ── */
.f3w-hdr {
  background: #111;      /* Black background */
  color: #fff;
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 14px;
}

/* The F3 logo image in the header */
.f3w-hdr-mark {
  width: 42px;
  height: 42px;
  flex-shrink: 0;        /* Prevents logo from shrinking */
  border-radius: 3px;
}

.f3w-hdr-text { flex: 1; } /* Takes up remaining header space */

/* Region name text (e.g. "F3 Waxhaw") — set by WIDGET_TITLE in CONFIG */
.f3w-hdr-name {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: .02em;
  line-height: 1;
}

/* "Fitness · Fellowship · Faith" tagline */
.f3w-hdr-tag {
  font-size: 10px;
  color: #aaa;
  letter-spacing: .12em;
  text-transform: uppercase;
  margin-top: 3px;
}

/* "Upcoming Workouts" label in top-right corner */
.f3w-hdr-label {
  font-size: 10px;
  color: #888;
  text-align: right;
  letter-spacing: .1em;
  text-transform: uppercase;
  line-height: 1.5;
}

/* ── DAY GROUPS (each day gets its own section) ── */
.f3w-day { border-bottom: 1px solid #eee; }
.f3w-day:last-child { border-bottom: none; }

/* The day label bar (e.g. "MONDAY  Mar 25") */
.f3w-day-hdr {
  background: #f7f7f7;
  padding: 6px 16px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: #555;
  border-bottom: 1px solid #eee;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* TODAY's header gets a red background instead of gray */
.f3w-today .f3w-day-hdr {
  background: #c8102e;   /* F3 red — change this to your region's color if desired */
  color: #fff;
  border-bottom-color: #a50d24;
}

/* The date portion of the day header (slightly faded) */
.f3w-day-date { font-weight: 400; opacity: .7; }

/* ── EVENT ROWS (one row per workout) ── */
/* Three columns: time | workout name + pills | Q name */
.f3w-row {
  padding: 11px 16px;
  border-bottom: 1px solid #f0f0f0;
  display: grid;
  grid-template-columns: 50px 1fr auto;  /* time=50px, name=flexible, Q=auto */
  gap: 12px;
  align-items: center;
}
.f3w-row:last-child { border-bottom: none; }
.f3w-row:hover { background: #fafafa; }  /* Subtle hover highlight */

/* Time column */
.f3w-time { text-align: right; line-height: 1; }

/* The large time number (e.g. "5:30") in F3 red */
.f3w-time-val {
  font-size: 17px;
  font-weight: 800;
  color: #c8102e;        /* F3 red */
  font-variant-numeric: tabular-nums;  /* Keeps number widths consistent */
}

/* AM / PM label under the time */
.f3w-time-ap {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: #aaa;
  margin-top: 2px;
}

/* AO / workout name (e.g. "COWBELL") */
.f3w-name {
  font-size: 15px;
  font-weight: 700;
  color: #111;
  letter-spacing: .01em;
  line-height: 1.1;
  text-transform: uppercase;
}

/* Container for the colored pill badges below the AO name */
.f3w-pills {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-top: 5px;
  flex-wrap: wrap;       /* Wraps to next line if needed */
}

/* Base pill style — all badges share this */
.f3w-pill {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 20px;   /* Fully rounded pill shape */
  line-height: 1.6;
  white-space: nowrap;
}

/* Pill colors by workout type.
   To change a color, edit the background and color values. */
.f3w-pill-bc       { background: #f0f0f0; color: #555; }          /* Bootcamp — gray */
.f3w-pill-run      { background: #dcf5e6; color: #1a6b35; }       /* Run — green */
.f3w-pill-ruck     { background: #fef3dc; color: #7a5010; }       /* Ruck — tan */
.f3w-pill-bike     { background: #dceeff; color: #1a4a8a; }       /* Bike — blue */
.f3w-pill-mobility { background: #f0e8ff; color: #5a1a8a; }       /* Mobility — purple */
.f3w-pill-gear     { background: #fff0dc; color: #8a5a1a; }       /* Gear — orange */
.f3w-pill-preblast { background: #dcf5e6; color: #1a6b35; }       /* Preblast — green */

/* Q column (right side of each row) */
.f3w-q { text-align: right; min-width: 72px; flex-shrink: 0; }

/* Small "Q" label above the Q's name */
.f3w-q-lbl {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: #aaa;
  margin-bottom: 2px;
}

/* The Q's actual name */
.f3w-q-name { font-size: 13px; font-weight: 700; color: #111; line-height: 1.2; }

/* "Q OPEN" badge shown when no Q is assigned — red outline pill */
.f3w-q-open {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: #c8102e;
  background: #fff0f2;
  border: 1px solid #c8102e;
  border-radius: 3px;
  padding: 3px 7px;
  line-height: 1;
}

/* ── LOADING / ERROR STATES ── */
/* Shown while data is being fetched, or if something goes wrong */
.f3w-state {
  padding: 32px 18px;
  text-align: center;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: #aaa;
}

/* Spinning circle shown during loading */
.f3w-state-spin {
  width: 24px;
  height: 24px;
  border: 3px solid #eee;
  border-top-color: #c8102e;  /* Red segment that spins */
  border-radius: 50%;
  animation: f3spin .7s linear infinite;
  margin: 0 auto 12px;
}

@keyframes f3spin { to { transform: rotate(360deg); } }

/* ── FOOTER (gray bar at the bottom) ── */
.f3w-ftr {
  background: #f7f7f7;
  border-top: 1px solid #eee;
  padding: 9px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.f3w-ftr a {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: #888;
  text-decoration: none;
}
.f3w-ftr a:hover { color: #111; }

/* "F3 Nation" brand text in footer */
.f3w-ftr-brand { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #c8102e; }

</style>
</head>

<script>

// ============================================================
// CONFIG — THIS IS THE ONLY PART YOU NEED TO CHANGE
// ============================================================
var F3W = {

  // YOUR REGION'S ID NUMBER from F3 Nation.
  // Find it in the F3 Nation app under: Settings → Region → orgId
  // Or ask in the F3 tech channel and someone can look it up for you.
  // Example: 25273 is F3 Waxhaw. Your number will be different.
  // Reads regionOrgId from the URL automatically.
  // e.g. https://your-site.netlify.app/?regionOrgId=25273
  // If not in URL, falls back to the default below.
  REGION_ORG_ID : new URLSearchParams(window.location.search).get('regionOrgId') || 0,  // ← set your orgId here

  // THE URL OF YOUR REGION'S WORDPRESS SITE + /wp-json/f3/v1
  // This is the secure proxy that fetches schedule data server-side.
  // Your site must have the f3-ao-manager plugin installed.
  // NO API TOKEN NEEDED — it's stored safely on the server, not here.
  // Change this to your own region's WordPress URL.
  // Leave this as-is — automatically points to your Netlify site
  PROXY_URL : window.location.origin,

  // How many days of upcoming workouts to show.
  // 7 = one week, 14 = two weeks (default), 30 = one month.
  // Tip: 14 is a good balance between useful and overwhelming.
  DAYS_AHEAD    : 14,

  // Your region's name — shown in the widget header.
  // Example: 'F3 Raleigh' or 'F3 Atlanta South'
  // Override with ?title=F3+Raleigh in the URL, or set a default here
  WIDGET_TITLE  : new URLSearchParams(window.location.search).get('title') || 'F3 Nation',

  // The URL of your region's website.
  // This appears as the "Our Site" link in the widget footer.
  // Include the https:// at the start.
  REGION_URL    : new URLSearchParams(window.location.search).get('siteUrl') || 'https://f3nation.com',

};
// ============================================================
// END CONFIG — do not change anything below this line
// unless you know what you're doing
// ============================================================


// Self-executing function — runs automatically when the page loads.
// Wrapping everything in here prevents conflicts with other scripts
// on your page.
(function() {

  // Apply the region name and site link from CONFIG
  document.getElementById('f3w-name').textContent = F3W.WIDGET_TITLE;
  var sl = document.getElementById('f3w-sitelink');
  if (sl) sl.href = F3W.REGION_URL;

  // Calculate today's date and the end date (today + DAYS_AHEAD)
  // Dates are formatted as YYYY-MM-DD which is what the F3 Nation API expects
  var today  = new Date();
  var tStr   = today.toISOString().split('T')[0];   // e.g. "2026-03-25"
  var eDate  = new Date(today);
  eDate.setDate(eDate.getDate() + F3W.DAYS_AHEAD);
  var eStr   = eDate.toISOString().split('T')[0];   // e.g. "2026-04-08"

  // Fetch schedule via the secure WordPress proxy.
  // The API token never leaves the server — this is safe to share publicly.
  // The proxy caches results for 30 minutes to keep things fast.
  fetch(F3W.PROXY_URL + '/.netlify/functions/region-schedule?regionOrgId=' + F3W.REGION_ORG_ID)

  // Parse the JSON response
  .then(function(r){ return r.json(); })

  // Process and render the schedule data
  .then(function(data){

    // Filter to only events within our date range that have a start time.
    // (Timeless events are typically all-day or non-workout entries.)
    var events = (data.events || []).filter(function(e){
      return e.startDate >= tStr && e.startDate <= eStr && e.startTime;
    });

    // If no workouts found, show a friendly message
    if (!events.length) {
      document.getElementById('f3w-body').innerHTML =
        '<div class="f3w-state">No workouts in the next ' + F3W.DAYS_AHEAD + ' days</div>';
      return;
    }

    // Group events by date so we can render a section per day.
    // byDate looks like: { "2026-03-25": [event1, event2], "2026-03-26": [event3], ... }
    var byDate = {};
    events.forEach(function(e){
      if (!byDate[e.startDate]) byDate[e.startDate] = [];
      byDate[e.startDate].push(e);
    });

    // Day and month name arrays for formatting dates into readable strings
    var days  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    var mons  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var html  = '';  // We'll build the HTML string here and inject it all at once

    // Loop through each date in chronological order
    Object.keys(byDate).sort().forEach(function(ds){
      var d      = new Date(ds + 'T12:00:00');  // noon avoids timezone edge cases
      var isTdy  = ds === tStr;                  // true if this date is today
      var dName  = isTdy ? 'Today' : days[d.getDay()];  // "Today" or "Monday" etc.
      var dDate  = mons[d.getMonth()] + ' ' + d.getDate();  // "Mar 25"

      // Open the day group div — add 'f3w-today' class if it's today (turns header red)
      html += '<div class="f3w-day' + (isTdy ? ' f3w-today' : '') + '">';
      html += '<div class="f3w-day-hdr">' + dName
        + ' <span class="f3w-day-date">' + dDate + '</span></div>';

      // Sort this day's events by start time, then render each one
      byDate[ds]
        .sort(function(a,b){ return (a.startTime||'').localeCompare(b.startTime||''); })
        .forEach(function(e){

          // Convert 24hr time (e.g. "0530") to 12hr display (e.g. "5:30 AM")
          var raw  = e.startTime || '0530';
          var h    = parseInt(raw.slice(0,2));   // hour as number
          var m    = raw.slice(2);               // minutes as string ("30")
          var ap   = h >= 12 ? 'PM' : 'AM';     // AM or PM
          var h12  = h > 12 ? h - 12 : (h === 0 ? 12 : h);  // convert to 12hr

          // Build colored pill badges for each event type.
          // An event can have multiple types (e.g. Bootcamp + Gear).
          var pills = '';
          (e.eventTypes || []).forEach(function(t){
            var n  = (t.name || '').toLowerCase();
            // Map type name to CSS class suffix for pill color
            var cl = n.includes('run')               ? 'run'
                   : n.includes('ruck')              ? 'ruck'
                   : n.includes('bike') || n.includes('cycl') ? 'bike'
                   : n.includes('mobil')             ? 'mobility'
                   : n.includes('gear')              ? 'gear'
                   : 'bc';  // default = bootcamp (gray)
            pills += '<span class="f3w-pill f3w-pill-' + cl + '">' + t.name + '</span>';
          });

          // Add a "Preblast ✓" pill if a preblast has been posted for this workout
          if (e.hasPreblast) pills += '<span class="f3w-pill f3w-pill-preblast">Preblast ✓</span>';

          // Build the Q section.
          // plannedQs is the Q's F3 name as a string, or null if no Q is signed up.
          var qHtml = e.plannedQs
            ? '<div class="f3w-q-lbl">Q</div><div class="f3w-q-name">' + e.plannedQs + '</div>'
            : '<div class="f3w-q-open">Q Open</div>';  // red badge if no Q

          // Build the full event row HTML
          // Layout: [time] [AO name + pills] [Q info]
          html += '<div class="f3w-row">'
            + '<div class="f3w-time">'
            +   '<div class="f3w-time-val">' + h12 + ':' + m + '</div>'
            +   '<div class="f3w-time-ap">' + ap + '</div>'
            + '</div>'
            + '<div>'
            // Use orgName (AO name) with fallbacks to seriesName or instance name
            +   '<div class="f3w-name">' + (e.orgName || e.seriesName || e.name) + '</div>'
            +   (pills ? '<div class="f3w-pills">' + pills + '</div>' : '')
            + '</div>'
            + '<div class="f3w-q">' + qHtml + '</div>'
            + '</div>';
        });

      html += '</div>';  // close .f3w-day
    });

    // Inject all the built HTML into the widget body at once
    document.getElementById('f3w-body').innerHTML = html;
  })

  // If the API call fails (network error, bad token, etc.) show an error message
  .catch(function(err){
    document.getElementById('f3w-body').innerHTML =
      '<div class="f3w-state">Could not load schedule —<br>check your API token &amp; region ID</div>';
    console.error('[F3 Widget]', err);
  });

})();  // end self-executing function

</script>
</body>
</html>
